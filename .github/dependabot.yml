version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    # 依存クールダウン: 公開直後のバージョンを version update PR に含めない
    # （security update は別系統で cooldown 対象外 = CVE patch は即時 PR）
    # 詳細: docs/dev/dependency-cooldown.md
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    # github-actions には cooldown を付けない（Dependabot 未サポート。付けると設定が拒否/無視される）
