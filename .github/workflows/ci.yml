name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - name: Audit dependencies (critical, non-blocking)
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities (non-blocking)"
      - run: npx biome check cli/
      - run: npx tsc --noEmit
      - run: npx vitest run
